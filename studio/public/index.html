<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QMM Author Studio</title>
  <link rel="stylesheet" href="studio.css">
</head>
<body>
  <div id="app">
    <nav>
      <div class="brand">QMM Studio<small>story-pack authoring</small></div>
      <a href="#/" data-nav="dash">Modules</a>
      <div class="mod" id="nav-mod" style="display:none">module</div>
      <a href="#" data-nav="author" style="display:none">Author chat</a>
      <a href="#" data-nav="play" style="display:none">Playtest</a>
      <a href="#" data-nav="publish" style="display:none">Publish</a>
      <div class="mod" id="nav-tweak" style="display:none">tweak the agent's output</div>
      <a href="#" data-nav="story" style="display:none">Story</a>
      <a href="#" data-nav="beats" style="display:none">Beats</a>
      <a href="#" data-nav="lore" style="display:none">Lore</a>
      <a href="#" data-nav="test" style="display:none">Test bench</a>
      <a href="#" data-nav="signals" style="display:none">Signals</a>
      <div class="spacer"></div>
      <div class="foot">
        <div><span class="dot" id="dot-player"></span>player</div>
        <div><span class="dot" id="dot-ollama"></span>ollama</div>
        <label style="margin-top:8px">write token</label>
        <input type="text" id="token" placeholder="x-studio-token" autocomplete="off">
      </div>
    </nav>
    <main id="main"><p class="boot">loading…</p></main>
    <div id="strip" style="display:none">
      <span class="flex" id="strip-text"></span>
      <button id="btn-validate">Validate</button>
      <button id="btn-save" class="primary">Save</button>
    </div>
  </div>
  <script src="studio.js"></script>
</body>
</html>
